apiVersion: batch/v1
kind: CronJob
metadata:
  name: fetch-airlines
  namespace: skycards
spec:
  schedule: "0 9 * * *"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 300
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 600
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: fetch
              image: ghcr.io/skycards/changes:latest
              imagePullPolicy: Always
              args:
                - fetch
                - --data-name=airlines
                - --api-url=https://api.skycards.oldapes.com/airlines
                - --output-file=airlines.json
                - --timestamp-param=timestamp
                - --timestamp-url=https://api.skycards.oldapes.com/airlines/timestamp
              envFrom:
                - secretRef:
                    name: skycards-changes-secrets
                - configMapRef:
                    name: skycards-webhooks-config
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: "1"
                  memory: 512Mi
