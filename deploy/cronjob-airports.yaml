apiVersion: batch/v1
kind: CronJob
metadata:
  name: fetch-airports
  namespace: skycards
spec:
  schedule: "*/30 * * * *"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 300
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: fetch
              image: ghcr.io/skycards/changes:latest
              args:
                - fetch
                - --data-name=airports
                - --api-url=https://api.skycards.oldapes.com/airports
                - --output-file=airports.json
                - --mention-everyone
                - --compare-after
              envFrom:
                - secretRef:
                    name: skycards-changes-secrets
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: "1"
                  memory: 512Mi
