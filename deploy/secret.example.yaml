# Template only. Fill in real values, then seal with kubeseal (Task 13).
# The plaintext form must never be committed.
apiVersion: v1
kind: Secret
metadata:
  name: skycards-changes-secrets
  namespace: skycards
type: Opaque
stringData:
  # Fine-grained PAT with contents:write on Skycards/Changes.
  GIT_TOKEN: "REPLACE_ME"
  # One key per Discord webhook. Any WEBHOOK_*-named key is picked up.
  WEBHOOK_MAIN: "https://discord.com/api/webhooks/REPLACE_ME"
