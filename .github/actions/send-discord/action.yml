name: "Send Discord webhooks"
description: "Post a Markdown message to all configured Discord webhooks, attaching it as a file when it exceeds the limit."
inputs:
  message_file:
    description: "Path to the Markdown message file"
    required: true
  tldr:
    description: "Short summary used when the message is too long"
    required: true
  caption:
    description: "Optional multi-line caption for the file-attachment message (falls back to tldr when empty)"
    required: false
    default: ""
  link:
    description: "Commit or report URL for the full changes"
    required: true
  username:
    description: "Webhook display username"
    required: true
  mention:
    description: "Optional mention prefix (e.g. @everyone). Empty for none."
    required: false
    default: ""
runs:
  using: "composite"
  steps:
    - name: Post to Discord webhooks
      shell: bash
      env:
        MESSAGE_FILE: ${{ inputs.message_file }}
        TLDR: ${{ inputs.tldr }}
        CAPTION: ${{ inputs.caption }}
        LINK: ${{ inputs.link }}
        USERNAME: ${{ inputs.username }}
        MENTION: ${{ inputs.mention }}
      run: |
        AVATAR="https://avatars.githubusercontent.com/u/224248835?s=256"
        LIMIT=1900

        if [ ! -s "$MESSAGE_FILE" ]; then
          echo "No message file or empty message; nothing to send."
          exit 0
        fi

        LEN=$(python3 -c "import sys; print(len(open(sys.argv[1], encoding='utf-8').read()))" "$MESSAGE_FILE")
        # Mention goes on its own line so a following Markdown heading (## ...)
        # still starts at the beginning of a line and renders correctly.
        PREFIX=""
        if [ -n "$MENTION" ]; then PREFIX="$MENTION"$'\n'; fi

        # The inline message carries two Discord-only rendering artifacts:
        # leading-dash escapes (\-) that stop sub-lines reflowing into bullet
        # lists, and angle brackets around link targets ([x](<url>)) that
        # suppress embeds. Both are noise in the raw file preview, so strip
        # them from the attached copy only.
        ATTACH_FILE="$MESSAGE_FILE"
        FILE_TITLE=""
        if [ "$LEN" -gt "$LIMIT" ]; then
          ATTACH_FILE="$(mktemp)"
          sed -E -e 's/^([[:space:]]*)\\-/\1-/' -e 's/\]\(<([^>]*)>\)/](\1)/g' "$MESSAGE_FILE" > "$ATTACH_FILE"
          # First line is always the "## ... update" heading; keep it in the
          # inline message so the attachment is identifiable at a glance.
          FILE_TITLE=$(head -n 1 "$MESSAGE_FILE")
        fi

        for webhook_var in $(env | grep '^WEBHOOK_' | cut -d= -f1); do
          url=$(printenv "$webhook_var")
          [ -z "$url" ] && continue
          echo "Sending to $webhook_var (len=$LEN, limit=$LIMIT)"

          if [ "$LEN" -le "$LIMIT" ]; then
            content="${PREFIX}$(cat "$MESSAGE_FILE")"
            jq -n --arg c "$content" --arg u "$USERNAME" --arg a "$AVATAR" \
              '{content: $c, username: $u, avatar_url: $a, attachments: []}' \
              | curl -sf -X POST -H "Content-Type: application/json" -d @- "$url" \
              || echo "Failed to send to $webhook_var"
          else
            BODY="${CAPTION:-$TLDR}"
            content="${PREFIX}${FILE_TITLE}"$'\n'"${BODY}"$'\n\n'"See [commit](<${LINK}>) for full changes"
            payload=$(jq -cn --arg c "$content" --arg u "$USERNAME" --arg a "$AVATAR" \
              '{content: $c, username: $u, avatar_url: $a, attachments: [{id: 0, filename: "changes.md"}]}')
            curl -sf -X POST \
              -F "payload_json=$payload" \
              -F "files[0]=@${ATTACH_FILE};type=text/markdown;filename=changes.md" \
              "$url" || echo "Failed to send to $webhook_var"
          fi
        done
