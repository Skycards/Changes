name: Compare Airport Counts

on:
  workflow_run:
    workflows: ["Fetch API Data"]
    types:
      - completed
  workflow_dispatch: # Allow manual triggering

permissions:
  contents: write

jobs:
  compare-airports:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # No external dependencies needed - using built-in Python libraries

      - name: Run airport comparison
        run: |
          python compare_airports.py

      - name: Check for changes in airport differences file
        id: changes
        run: |
          changes_detected=false

          # Check if airport differences file exists and has changes
          if [ -f airport_differences.json ]; then
            if ! git diff --quiet HEAD airport_differences.json 2>/dev/null; then
              changes_detected=true
              echo "Changes detected in airport differences"
            fi
          else
            echo "No airport_differences.json file found"
          fi

          if [ "$changes_detected" = true ]; then
            echo "changes=true" >> $GITHUB_OUTPUT
          else
            echo "changes=false" >> $GITHUB_OUTPUT
            echo "No changes detected in airport differences file"
          fi

      - name: Configure Git
        if: steps.changes.outputs.changes == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Capture previous state
        if: steps.changes.outputs.changes == 'true'
        run: |
          LAST_CMP=$(git log -1 --format=%H -- airport_differences.json || true)
          if [ -n "$LAST_CMP" ]; then
            git show "$LAST_CMP:airport_differences.json" > /tmp/previous_differences.json 2>/dev/null || echo "" > /tmp/previous_differences.json
            git show "$LAST_CMP:airports.json"            > /tmp/previous_airports.json     2>/dev/null || echo "" > /tmp/previous_airports.json
          else
            echo "" > /tmp/previous_differences.json
            echo "" > /tmp/previous_airports.json
          fi

      - name: Build webhook summary
        id: summary
        if: steps.changes.outputs.changes == 'true'
        run: |
          # Run before committing so the TLDR can go in the commit body. The
          # commit URL isn't known yet, so use a placeholder and substitute it
          # into the message after the commit (Finalize webhook link step).
          TLDR=$(python3 scripts/format_changes.py \
            --type comparison \
            --old /tmp/previous_differences.json \
            --new airport_differences.json \
            --old-airports /tmp/previous_airports.json \
            --airports airports.json \
            --link "__COMMIT_URL__" \
            --out /tmp/webhook_message.md)
          {
            echo "tldr<<WEBHOOK_EOF"
            echo "${TLDR}"
            echo "WEBHOOK_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Commit airport differences file
        if: steps.changes.outputs.changes == 'true'
        run: |
          git add airport_differences.json
          SUMMARY="${{ steps.summary.outputs.tldr }}"
          if [ -n "$SUMMARY" ]; then
            git commit \
              -m "chore(comparison): update airport comparison data - $(date -u '+%Y-%m-%d %H:%M:%S UTC')" \
              -m "$SUMMARY"
          else
            git commit \
              -m "chore(comparison): update airport comparison data - $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          fi

          # Handle potential race condition
          for i in {1..3}; do
            if git push; then
              echo "Push successful on attempt $i"
              break
            else
              echo "Push failed on attempt $i, pulling latest changes..."
              git pull --rebase origin main
              if [ $i -eq 3 ]; then
                echo "Failed to push after 3 attempts"
                exit 1
              fi
            fi
          done

      - name: Finalize webhook link
        id: message
        if: steps.changes.outputs.changes == 'true'
        run: |
          COMMIT_HASH=$(git rev-parse HEAD)
          LINK="https://github.com/Skycards/Changes/commit/${COMMIT_HASH}"
          echo "link=${LINK}" >> "$GITHUB_OUTPUT"
          sed -i "s|__COMMIT_URL__|${LINK}|g" /tmp/webhook_message.md

      - name: Load webhook secrets
        if: steps.changes.outputs.changes == 'true'
        uses: oNaiPs/secrets-to-env-action@v1
        with:
          secrets: ${{ toJSON(secrets) }}
          prefix: WEBHOOK_

      - name: Send Discord webhook notifications
        if: steps.changes.outputs.changes == 'true'
        uses: ./.github/actions/send-discord
        with:
          message_file: /tmp/webhook_message.md
          tldr: ${{ steps.summary.outputs.tldr }}
          link: ${{ steps.message.outputs.link }}
          username: "Skycards Airport Comparison"
          mention: ""

      - name: Log no changes
        if: steps.changes.outputs.changes == 'false'
        run: echo "No changes to commit. Airport differences file is up to date."