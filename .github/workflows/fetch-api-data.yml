name: Fetch API Data

on:
  schedule:
    # Run every 30 minutes
    - cron: "*/30 * * * *"
  workflow_dispatch: # Allow manual triggering

permissions:
  contents: write

jobs:
  fetch-data:
    strategy:
      matrix:
        api:
          - url: "https://api.skycards.oldapes.com/airports"
            file: "airports.json"
            name: "airports"
          - url: "https://api.skycards.oldapes.com/models"
            file: "models.json"
            name: "models"
          - url: "https://api.skycards.oldapes.com/airlines"
            file: "airlines.json"
            name: "airlines"
            timestamp_param: "timestamp"
            timestamp_url: "https://api.skycards.oldapes.com/airlines/timestamp"

    uses: ./.github/workflows/fetch-single-api.yml
    with:
      api_url: ${{ matrix.api.url }}
      output_file: ${{ matrix.api.file }}
      data_name: ${{ matrix.api.name }}
      timestamp_param: ${{ matrix.api.timestamp_param || 'updatedAt' }}
      timestamp_url: ${{ matrix.api.timestamp_url || '' }}
      # @everyone for airports/models, but not airlines/fleets. (Name comparison
      # avoids the null-coerces-to-false trap of `matrix.api.x != false`.)
      mention_everyone: ${{ matrix.api.name != 'airlines' }}
    secrets: inherit
