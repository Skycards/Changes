name: Fetch Single API Data

on:
  workflow_call:
    inputs:
      api_url:
        description: "API endpoint URL (without timestamp parameter)"
        required: true
        type: string
      output_file:
        description: "Output filename for the JSON data"
        required: true
        type: string
      data_name:
        description: "Display name for the data type (for logging)"
        required: true
        type: string
      timestamp_param:
        description: "Query parameter name used for the cache-busting timestamp"
        required: false
        type: string
        default: "updatedAt"
      timestamp_url:
        description: "Optional URL that returns the timestamp to use. When unset, the current time is used."
        required: false
        type: string
        default: ""
      mention_everyone:
        description: "Prefix webhook messages with @everyone"
        required: false
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  fetch-single-api:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Determine timestamp
        id: timestamp
        run: |
          if [ -n "${{ inputs.timestamp_url }}" ]; then
            echo "Fetching timestamp from ${{ inputs.timestamp_url }}"
            TS=$(curl -s \
              -H "User-Agent: GitHub-Actions/1.0" \
              -H "X-Client-Version: 3.0.0" \
              "${{ inputs.timestamp_url }}")
            if ! echo "$TS" | grep -qE '^[0-9]+$'; then
              echo "Invalid timestamp received: '$TS'"
              exit 1
            fi
            echo "timestamp=${TS}" >> $GITHUB_OUTPUT
          else
            echo "timestamp=$(date +%s%3N)" >> $GITHUB_OUTPUT
          fi

      - name: Fetch ${{ inputs.data_name }} data
        run: |
          echo "Fetching ${{ inputs.data_name }} from ${{ inputs.api_url }}?${{ inputs.timestamp_param }}=${{ steps.timestamp.outputs.timestamp }}"
          curl -s \
            -H "User-Agent: GitHub-Actions/1.0" \
            -H "X-Client-Version: 3.0.0" \
            "${{ inputs.api_url }}?${{ inputs.timestamp_param }}=${{ steps.timestamp.outputs.timestamp }}" | jq '.' > ${{ inputs.output_file }}

      - name: Check for changes in ${{ inputs.output_file }}
        id: changes
        run: |
          if git diff --quiet HEAD ${{ inputs.output_file }}; then
            echo "changes=false" >> $GITHUB_OUTPUT
            echo "only_updatedAt=false" >> $GITHUB_OUTPUT
            echo "No changes detected in ${{ inputs.output_file }}"
          else
            echo "changes=true" >> $GITHUB_OUTPUT
            echo "Changes detected in ${{ inputs.output_file }}"

            # Check if only updatedAt changed
            DIFF_OUTPUT=$(git diff HEAD ${{ inputs.output_file }})
            # Extract only actual changed lines (lines starting with + or - but not +++ or ---)
            CHANGED_LINES=$(echo "$DIFF_OUTPUT" | grep -E "^[\+\-]" | grep -vE "^[\+\-]{3}" || true)

            # Check if all changed lines contain "updatedAt"
            # If there are no changed lines, or all changed lines contain "updatedAt", then only updatedAt changed
            if [ -z "$CHANGED_LINES" ]; then
              echo "only_updatedAt=true" >> $GITHUB_OUTPUT
              echo "Only updatedAt field changed - will skip webhooks"
            else
              # Count lines that don't contain "updatedAt"
              NON_UPDATEDAT_COUNT=$(echo "$CHANGED_LINES" | grep -v "updatedAt" | wc -l | tr -d ' ' || echo "0")

              if [ "$NON_UPDATEDAT_COUNT" = "0" ]; then
                echo "only_updatedAt=true" >> $GITHUB_OUTPUT
                echo "Only updatedAt field changed - will skip webhooks"
              else
                echo "only_updatedAt=false" >> $GITHUB_OUTPUT
                echo "Changes detected beyond updatedAt - will send webhooks"
              fi
            fi
          fi

      - name: Capture previous version
        if: steps.changes.outputs.changes == 'true' && steps.changes.outputs.only_updatedAt != 'true'
        run: |
          git show HEAD:${{ inputs.output_file }} > /tmp/previous.json 2>/dev/null || echo "" > /tmp/previous.json

      - name: Build webhook summary
        id: summary
        if: steps.changes.outputs.changes == 'true' && steps.changes.outputs.only_updatedAt != 'true'
        run: |
          # Run before committing so the TLDR can go in the commit body. The
          # commit URL isn't known yet, so use a placeholder and substitute it
          # into the message after the commit (Finalize webhook link step).
          TLDR=$(python3 scripts/format_changes.py \
            --type "${{ inputs.data_name }}" \
            --old /tmp/previous.json \
            --new "${{ inputs.output_file }}" \
            --link "__COMMIT_URL__" \
            --out /tmp/webhook_message.md \
            --meta-out /tmp/webhook_meta.txt)
          {
            echo "tldr<<WEBHOOK_EOF"
            echo "${TLDR}"
            echo "WEBHOOK_EOF"
            echo "is_misc=$(cat /tmp/webhook_meta.txt)"
          } >> "$GITHUB_OUTPUT"

      - name: Commit ${{ inputs.output_file }} changes
        if: steps.changes.outputs.changes == 'true'
        run: |
          git add ${{ inputs.output_file }}
          SUMMARY="${{ steps.summary.outputs.tldr }}"
          if [ -n "$SUMMARY" ]; then
            git commit \
              -m "chore(${{ inputs.data_name }}): update data - $(date -u '+%Y-%m-%d %H:%M:%S UTC')" \
              -m "$SUMMARY"
          else
            git commit -m "chore(${{ inputs.data_name }}): update data - $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          fi

          # Handle potential race condition from parallel matrix jobs
          for i in {1..3}; do
            if git push; then
              echo "Push successful on attempt $i"
              break
            else
              echo "Push failed on attempt $i, pulling latest changes..."
              git pull --rebase origin main
              if [ $i -eq 3 ]; then
                echo "Failed to push after 3 attempts"
                exit 1
              fi
            fi
          done

      - name: Finalize webhook link
        id: message
        if: steps.changes.outputs.changes == 'true' && steps.changes.outputs.only_updatedAt != 'true'
        run: |
          COMMIT_HASH=$(git rev-parse HEAD)
          LINK="https://github.com/Skycards/Changes/commit/${COMMIT_HASH}"
          echo "link=${LINK}" >> "$GITHUB_OUTPUT"
          sed -i "s|__COMMIT_URL__|${LINK}|g" /tmp/webhook_message.md

      - name: Load webhook secrets
        if: steps.changes.outputs.changes == 'true' && steps.changes.outputs.only_updatedAt != 'true'
        uses: oNaiPs/secrets-to-env-action@v1
        with:
          secrets: ${{ toJSON(secrets) }}
          prefix: WEBHOOK_

      - name: Send Discord webhook notifications
        if: steps.changes.outputs.changes == 'true' && steps.changes.outputs.only_updatedAt != 'true'
        uses: ./.github/actions/send-discord
        with:
          message_file: /tmp/webhook_message.md
          tldr: ${{ steps.summary.outputs.tldr }}
          link: ${{ steps.message.outputs.link }}
          username: "Skycards"
          # Never @everyone on a misc (non-gameplay) notice, even when the API
          # would otherwise ping (airports/models).
          mention: ${{ (inputs.mention_everyone && steps.summary.outputs.is_misc != 'true') && '@everyone' || '' }}

      - name: Log no changes for ${{ inputs.data_name }}
        if: steps.changes.outputs.changes == 'false'
        run: echo "No changes to commit. ${{ inputs.data_name }} data is up to date."
